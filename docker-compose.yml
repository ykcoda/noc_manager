services:
  noc-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: noc-managers:latest
    container_name: noc-managers
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
